     ═══════════════════════════════════════════════════ -->

       LIGHTING  (natural day)
       ══════════════════════════ -->

  <!-- ══════════════════════════
       SUN
       ══════════════════════════ -->

       CLOUDS
       ══════════════════════════ -->

  </a-entity>
  <a-entity position="10 17 -40">

    <a-sphere radius="1.0" color="#F0F0F0" position="-1.5 -0.3 0"></a-sphere>

  </a-entity>

       GROUND  –  natural green grass
       ══════════════════════════ -->
  <a-plane position="0 0 0" rotation="-90 0 0"
           width="100" height="100" color="#4CAF50"></a-plane>
